  return <span>{c.toLocaleString("id-ID")}</span>;
}

          <div style={cs.card}>
            <h3 style={{fontSize:15,fontWeight:700,marginBottom:16,color:"#334155"}}>Detail 18 Skema Pendanaan</h3>
            <div style={{overflowX:"auto"}}>
              <table style={{width:"100%",borderCollapse:"separate",borderSpacing:0,fontSize:12}}>
                <thead>
                  <tr style={{background:"#f1f5f9"}}>
                    {["No","Program","Skema","Masuk","Didanai","Rate"].map((h,i)=>(
                      <th key={i} style={{padding:"11px 12px",textAlign:i>2?"center":"left",fontWeight:700,color:"#475569",borderBottom:"2px solid #e2e8f0",fontSize:11}}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {REKAP.map((r,i)=>{
                    const rt=((r.dana/r.sel)*100).toFixed(1);
                    return(
                      <tr key={i} style={{background:i%2===0?"white":"#fafbfc"}} onMouseEnter={e=>e.currentTarget.style.background="#f0f9ff"} onMouseLeave={e=>e.currentTarget.style.background=i%2===0?"white":"#fafbfc"}>
                        <td style={{padding:"9px 12px",borderBottom:"1px solid #f1f5f9",color:"#94a3b8",fontWeight:600}}>{i+1}</td>
                        <td style={{padding:"9px 12px",borderBottom:"1px solid #f1f5f9"}}><span style={cs.badge(r.prog==="PL"?"#dbeafe":"#ede9fe",r.prog==="PL"?"#1d4ed8":"#7c3aed")}>{r.prog==="PL"?"Penelitian":"Pengabdian"}</span></td>
                        <td style={{padding:"9px 12px",borderBottom:"1px solid #f1f5f9",fontWeight:500}}>{r.skema}</td>
                        <td style={{padding:"9px 12px",borderBottom:"1px solid #f1f5f9",textAlign:"center",fontWeight:700}}>{r.sel}</td>
                        <td style={{padding:"9px 12px",borderBottom:"1px solid #f1f5f9",textAlign:"center",fontWeight:700,color:"#0ea5e9"}}>{r.dana}</td>
                        <td style={{padding:"9px 12px",borderBottom:"1px solid #f1f5f9",textAlign:"center"}}>
                          <span style={cs.badge(Number(rt)===100?"#dcfce7":Number(rt)>=80?"#dbeafe":"#fef3c7",Number(rt)===100?"#15803d":Number(rt)>=80?"#1d4ed8":"#92400e")}>{rt}%</span>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
                <tfoot>
                  <tr style={{background:"#f1f5f9",fontWeight:700}}>
                    <td colSpan={3} style={{padding:"11px 12px",borderTop:"2px solid #e2e8f0"}}>GRAND TOTAL</td>
                    <td style={{padding:"11px 12px",borderTop:"2px solid #e2e8f0",textAlign:"center"}}>{totalSel}</td>
                    <td style={{padding:"11px 12px",borderTop:"2px solid #e2e8f0",textAlign:"center",color:"#0ea5e9"}}>{totalDana}</td>
                    <td style={{padding:"11px 12px",borderTop:"2px solid #e2e8f0",textAlign:"center"}}>{rate}%</td>
                  </tr>
                </tfoot>
              </table>
            </div>
          </div>
        )}

        {/* ========== FAKULTAS ========== */}
        {tab==="fakultas"&&(
          <div style={{display:"flex",flexDirection:"column",gap:16}}>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:14}}>
              {fakStats.map((f,i)=>{
                const clr=FAK_COLORS[f.code]||"#64748b";
                // Get skema breakdown
                const skemaBreak={};
                RAW.filter(p=>p.f===f.code).forEach(p=>{
                  if(!skemaBreak[p.s])skemaBreak[p.s]=0;
                  skemaBreak[p.s]++;
                });
                const topSkemas=Object.entries(skemaBreak).sort((a,b)=>b[1]-a[1]).slice(0,5);
                return(
                  <div key={i} style={{...cs.card,position:"relative",overflow:"hidden",cursor:"pointer"}} onClick={()=>setExpanded(expanded===f.code?null:f.code)}>
                    <div style={{position:"absolute",top:-25,right:-25,width:70,height:70,borderRadius:"50%",background:clr,opacity:0.08}}/>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                      <div>
                        <div style={{fontSize:15,fontWeight:800,color:clr}}>{f.code}</div>
                        <div style={{fontSize:10,color:"#94a3b8"}}>{FAK_NAMES[f.code]||f.code}</div>
                      </div>
                      <div style={{textAlign:"right"}}>
                        <div style={{fontSize:26,fontWeight:800,color:"#1e293b"}}>{f.total}</div>
                        <div style={{fontSize:10,color:"#94a3b8"}}>proposal</div>
                      </div>
                    </div>
                    <div style={{display:"flex",gap:8}}>
                      <div style={{flex:1,background:"#f8fafc",borderRadius:8,padding:"6px 10px",textAlign:"center"}}>
                        <div style={{fontSize:10,color:"#64748b"}}>Penelitian</div>
                        <div style={{fontSize:17,fontWeight:700,color:"#0ea5e9"}}>{f.penelitian}</div>
                      </div>
                      <div style={{flex:1,background:"#f8fafc",borderRadius:8,padding:"6px 10px",textAlign:"center"}}>
                        <div style={{fontSize:10,color:"#64748b"}}>Pengabdian</div>
                        <div style={{fontSize:17,fontWeight:700,color:"#8b5cf6"}}>{f.pengabdian}</div>
                      </div>
                    </div>
                    <div style={{display:"flex",height:5,borderRadius:3,overflow:"hidden",marginTop:10,background:"#f1f5f9"}}>
                      <div style={{width:`${(f.penelitian/f.total)*100}%`,background:"#0ea5e9"}}/>
                      <div style={{width:`${(f.pengabdian/f.total)*100}%`,background:"#8b5cf6"}}/>
                    </div>
                    {expanded===f.code&&(
                      <div style={{marginTop:12,paddingTop:12,borderTop:"1px solid #f1f5f9"}}>
                        <div style={{fontSize:11,fontWeight:600,color:"#475569",marginBottom:6}}>Top Skema:</div>
                        {topSkemas.map(([sk,cnt],si)=>(
                          <div key={si} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"3px 0",fontSize:11}}>
                            <span style={{color:"#64748b",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",marginRight:8}}>{sk}</span>
                            <span style={{fontWeight:700,color:clr}}>{cnt}</span>
                          </div>
                        ))}
                      </div>
                    )}
                    <div style={{fontSize:9,color:"#cbd5e1",marginTop:6,textAlign:"center"}}>Klik untuk detail skema</div>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* ========== DATA PROPOSAL ========== */}
        {tab==="data"&&(
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            {/* Filters */}
            <div style={{...cs.card,padding:14}}>
              <div style={{display:"flex",flexWrap:"wrap",gap:10,alignItems:"flex-end"}}>
                <div style={{flex:"2 1 220px"}}>
                  <label style={{fontSize:10,fontWeight:600,color:"#64748b",display:"block",marginBottom:3}}>🔍 Cari Nama / Judul</label>
                  <input type="text" value={q} onChange={e=>setQ(e.target.value)} placeholder="Ketik nama dosen atau kata kunci judul..." style={cs.input}/>
                </div>
                <div style={{flex:"1 1 120px"}}>
                  <label style={{fontSize:10,fontWeight:600,color:"#64748b",display:"block",marginBottom:3}}>Fakultas</label>
                  <select value={fFak} onChange={e=>setFFak(e.target.value)} style={cs.select}>
                    {fakList.map(f=><option key={f} value={f}>{f}</option>)}
                  </select>
                </div>
                <div style={{flex:"1 1 160px"}}>
                  <label style={{fontSize:10,fontWeight:600,color:"#64748b",display:"block",marginBottom:3}}>Skema</label>
                  <select value={fSkema} onChange={e=>setFSkema(e.target.value)} style={cs.select}>
                    {skemaList.map(s=><option key={s} value={s}>{s}</option>)}
                  </select>
                </div>
                <div style={{flex:"1 1 90px"}}>
                  <label style={{fontSize:10,fontWeight:600,color:"#64748b",display:"block",marginBottom:3}}>Jenis</label>
                  <select value={fJenis} onChange={e=>setFJenis(e.target.value)} style={cs.select}>
                    {["Semua","Penelitian","Pengabdian"].map(j=><option key={j} value={j}>{j}</option>)}
                  </select>
                </div>
                <button onClick={()=>{setQ("");setFFak("Semua");setFSkema("Semua");setFJenis("Semua")}} style={{padding:"8px 14px",borderRadius:8,border:"1px solid #e2e8f0",background:"#f8fafc",fontSize:11,cursor:"pointer",fontWeight:600,color:"#64748b"}}>Reset</button>
              </div>
              <div style={{marginTop:8,fontSize:11,color:"#64748b",display:"flex",flexWrap:"wrap",gap:8,alignItems:"center"}}>
                <span>Menampilkan <b style={{color:"#0ea5e9"}}>{filtered.length}</b> dari <b>1.008</b> proposal</span>
                <span style={{color:"#cbd5e1"}}>|</span>
                <span style={{fontSize:10,color:"#94a3b8"}}>Halaman {page} dari {totalPages} • Klik header untuk sorting</span>
              </div>
            </div>

            {/* Table */}
            <div style={{...cs.card,padding:0,overflow:"hidden"}}>
              <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"separate",borderSpacing:0,fontSize:12}}>
                  <thead>
                    <tr style={{background:"#f8fafc"}}>
                      {[{k:"idx",l:"#",w:40},{k:"n",l:"Ketua Pengusul",w:180},{k:"f",l:"Fakultas",w:70},{k:"j",l:"Judul",w:300},{k:"s",l:"Skema",w:160},{k:"t",l:"Jenis",w:70}].map(col=>(
                        <th key={col.k} onClick={()=>col.k!=="idx"&&doSort(col.k)} style={{padding:"10px 8px",textAlign:"left",fontWeight:700,color:"#475569",borderBottom:"2px solid #e2e8f0",fontSize:11,cursor:col.k!=="idx"?"pointer":"default",userSelect:"none",minWidth:col.w,whiteSpace:"nowrap"}}>
                          {col.l} {sort.key===col.k?(sort.dir==="asc"?"↑":"↓"):""}
                        </th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {paged.map((p,i)=>(
                      <tr key={i} style={{background:i%2===0?"white":"#fafbfc"}} onMouseEnter={e=>e.currentTarget.style.background="#f0f9ff"} onMouseLeave={e=>e.currentTarget.style.background=i%2===0?"white":"#fafbfc"}>
                        <td style={{padding:"8px",borderBottom:"1px solid #f1f5f9",color:"#94a3b8",fontWeight:600,fontSize:11}}>{(page-1)*PAGE_SIZE+i+1}</td>
                        <td style={{padding:"8px",borderBottom:"1px solid #f1f5f9",fontWeight:600,color:"#1e293b",fontSize:12}}>{p.n}</td>
                        <td style={{padding:"8px",borderBottom:"1px solid #f1f5f9"}}><span style={{...cs.badge(`${FAK_COLORS[p.f]||"#94a3b8"}18`,FAK_COLORS[p.f]||"#475569"),fontSize:10}}>{p.f}</span></td>
                        <td style={{padding:"8px",borderBottom:"1px solid #f1f5f9",color:"#475569",lineHeight:1.35,fontSize:11.5}}>{p.j}</td>
                        <td style={{padding:"8px",borderBottom:"1px solid #f1f5f9",fontSize:10.5,color:"#64748b"}}>{p.s}</td>
                        <td style={{padding:"8px",borderBottom:"1px solid #f1f5f9"}}><span style={cs.badge(p.t==="Penelitian"?"#dbeafe":"#ede9fe",p.t==="Penelitian"?"#1d4ed8":"#7c3aed")}>{p.t}</span></td>
                      </tr>
                    ))}
                    {paged.length===0&&(
                      <tr><td colSpan={6} style={{padding:40,textAlign:"center",color:"#94a3b8",fontSize:13}}>Tidak ditemukan data yang sesuai filter.</td></tr>
                    )}
                  </tbody>
                </table>
              </div>
            </div>

            {/* Pagination */}
            {totalPages>1&&(
              <div style={{display:"flex",justifyContent:"center",alignItems:"center",gap:4,flexWrap:"wrap"}}>
                <button onClick={()=>setPage(1)} disabled={page===1} style={{padding:"6px 10px",borderRadius:6,border:"1px solid #e2e8f0",background:page===1?"#f1f5f9":"white",cursor:page===1?"default":"pointer",fontSize:11,fontWeight:600,color:page===1?"#cbd5e1":"#475569"}}>«</button>
                <button onClick={()=>setPage(Math.max(1,page-1))} disabled={page===1} style={{padding:"6px 10px",borderRadius:6,border:"1px solid #e2e8f0",background:page===1?"#f1f5f9":"white",cursor:page===1?"default":"pointer",fontSize:11,fontWeight:600,color:page===1?"#cbd5e1":"#475569"}}>‹</button>
                {Array.from({length:Math.min(7,totalPages)},(_,i)=>{
                  let p;
                  if(totalPages<=7)p=i+1;
                  else if(page<=4)p=i+1;
                  else if(page>=totalPages-3)p=totalPages-6+i;
                  else p=page-3+i;
                  return(
                    <button key={p} onClick={()=>setPage(p)} style={{padding:"6px 10px",borderRadius:6,border:page===p?"1px solid #0ea5e9":"1px solid #e2e8f0",background:page===p?"#0ea5e9":"white",color:page===p?"white":"#475569",cursor:"pointer",fontSize:11,fontWeight:page===p?700:500,minWidth:32}}>{p}</button>
                  );
                })}
                <button onClick={()=>setPage(Math.min(totalPages,page+1))} disabled={page===totalPages} style={{padding:"6px 10px",borderRadius:6,border:"1px solid #e2e8f0",background:page===totalPages?"#f1f5f9":"white",cursor:page===totalPages?"default":"pointer",fontSize:11,fontWeight:600,color:page===totalPages?"#cbd5e1":"#475569"}}>›</button>
                <button onClick={()=>setPage(totalPages)} disabled={page===totalPages} style={{padding:"6px 10px",borderRadius:6,border:"1px solid #e2e8f0",background:page===totalPages?"#f1f5f9":"white",cursor:page===totalPages?"default":"pointer",fontSize:11,fontWeight:600,color:page===totalPages?"#cbd5e1":"#475569"}}>»</button>
              </div>
            )}
          </div>
        )}
      </div>

      <div style={{textAlign:"center",padding:"12px 20px 28px",fontSize:10,color:"#94a3b8"}}>
        LPPM Universitas Negeri Semarang © 2026 • Data lengkap 1.008 proposal berdasarkan Surat No. B/3387/UN37.3.1/PT.01.05/2026
      </div>
    </div>
  );
}


    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
